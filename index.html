<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enter Name</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <main class="page-shell">
        <h1>Enter Your Name</h1>
        <p>Type the correct name to continue to the protected page.</p>

        <form action="/check" method="POST">
            <input type="text" name="name" placeholder="Your name" required />
            <button type="submit">Enter</button>
        </form>

        <footer>
            Secure access demo — powered by Express.js
        </footer>
    </main>

    <audio id="bg-audio" src="Libu-Libong%20Buwan%20(Uuwian).mp3" autoplay loop></audio>

    <script>
        const audio = document.getElementById('bg-audio');
        const resumeAudio = () => {
            if (audio && audio.paused) {
                audio.play().catch(() => {
                    // Autoplay may be blocked; wait for user interaction
                });
            }
        };

        document.addEventListener('DOMContentLoaded', resumeAudio);
        window.addEventListener('click', resumeAudio, { once: true });
        window.addEventListener('keydown', resumeAudio, { once: true });
    </script>
</body>
</html>
